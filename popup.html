<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <div class="header">
      💱 Multi Currency
    </div>

    <div class="section">
      <label>Amount</label>
      <input type="number" id="amount" placeholder="Enter amount" />
    </div>

    <div class="section">
      <label>Base Currency</label>
      <select id="baseCurrency"></select>
    </div>

    <div class="section">
      <label>Target Currencies</label>
      <div id="currencyList" class="currency-grid"></div>
    </div>

    <button id="convertBtn">Convert</button>

    <div id="results" class="results"></div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
